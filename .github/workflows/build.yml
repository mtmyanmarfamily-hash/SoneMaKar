name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Unzip project
        run: |
          unzip -q SoneMaKar_final.zip
          ls SoneMaKar

      - name: Build APK
        working-directory: SoneMaKar
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: SoneMaKar/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release v1.0.1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1
          name: SoneMaKar v1.0.1
          body: |
            🚗 SoneMaKar v1.0.1
          files: SoneMaKar/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
