name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find and unzip
        run: |
          ls -la
          unzip "$(ls *.zip | head -1)"
          ls -la

      - name: Build APK
        run: |
          cd SoneMaKar
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: SoneMaKar/app/build/outputs/apk/debug/app-debug.apk
