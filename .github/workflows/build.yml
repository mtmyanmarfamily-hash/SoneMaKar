name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # 1. Debugging: List files to ensure the zip is present
          ls -F
          
          # 2. Extract securely
          if [ -f "SoneMaKar_final.zip" ]; then
            unzip -q SoneMaKar_final.zip
          else
            echo "Error: SoneMaKar_final.zip not found!"
            exit 1
          fi
          
          # 3. Locate the correct directory containing gradlew
          # This finds the directory holding 'gradlew' to ensure we target the right path
          GRADLE_DIR=$(find . -maxdepth 3 -name "gradlew" -exec dirname {} \;)
          echo "Building in: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          
          # 4. Fix permissions explicitly
          echo "Setting permissions for gradlew..."
          chmod 755 gradlew
          ls -l gradlew
          
          # 5. Build the project
          ./gradlew assembleDebug
          
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          # This will find the APK anywhere in the workspace
          path: "**/app-debug.apk"
