name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip and build
        run: |
          unzip SoneMaKar_with_actions.zip
          echo "=== SoneMaKar contents ==="
          ls -la SoneMaKar/
          echo "=== Nested folder ==="
          ls -la SoneMaKar/SoneMaKar/ || echo "No nested folder"
          cd SoneMaKar/SoneMaKar
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
