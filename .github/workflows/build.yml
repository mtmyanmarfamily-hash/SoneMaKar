name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip and build
        run: |
          ls -la
          unzip "$(ls *.zip | head -1)"
          echo "=== After unzip ==="
          ls -la
          FOLDER=$(find . -name "gradlew" | head -1 | xargs dirname)
          echo "Found gradlew in: $FOLDER"
          cd "$FOLDER"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
