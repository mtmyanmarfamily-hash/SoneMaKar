jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract and Prepare Project
        run: |
          # Replace 'SoneMakar_final.zip' with your actual zip filename
          unzip -q SoneMakar_final.zip -d .
          # Ensure the directory exists
          ls -R SoneMakar

      - name: Build APK
        run: |
          # Navigate into the project directory
          cd SoneMakar
          
          # Force the gradlew script to be executable
          chmod +x gradlew
          
          # Run the build with debug flags for better visibility
          ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: SoneMakar/app/build/outputs/apk/debug/app-debug.apk
